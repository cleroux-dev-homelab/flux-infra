---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kube-prometheus-stack-controller
  namespace: flux-system
spec:
  targetNamespace: monitoring
  interval: 1m0s
  retryInterval: 30s
  timeout: 30s
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-infra
  path: ./components/monitoring/controllers/base/kube-prometheus-stack
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: flux-runtime-info
