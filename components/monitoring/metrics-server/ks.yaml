---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: metrics-server-controller
  namespace: flux-system
spec:
  interval: 1m0s
  retryInterval: 30s
  timeout: 30s
  prune: true
  wait: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: flux-infra
  path: ./components/monitoring/metrics-server/controller/envs/${ENVIRONMENT}
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: flux-runtime-info
