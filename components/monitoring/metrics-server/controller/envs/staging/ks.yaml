---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app.kubernetes.io/component: monitoring
    pod-security.kubernetes.io/enforce: privileged
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: metrics-server
  namespace: monitoring
spec:
  targetNamespace: monitoring
  interval: 1m
  retryInterval: 30s
  timeout: 30s
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: metrics-server
  path: components/monitoring/metrics-server/controller/base
  patches:
    - patch: |-
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        metadata:
          name: version
        spec:
          chart:
            spec:
              version: "7.0.0" # {"$imagepolicy": "monitoring:metrics-server:tag"}
      target:
        kind: HelmRelease
        name: metrics-server
        namespace: monitoring
