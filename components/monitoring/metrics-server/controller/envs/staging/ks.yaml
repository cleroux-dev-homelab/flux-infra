---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: metrics-server
spec:
  targetNamespace: monitoring
  interval: 1m
  retryInterval: 30s
  timeout: 30s
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: metrics-server
  path: components/monitoring/metrics-server/controller/base
  images:
    - name: metrics-server
      newTag: "6.0.0" # {"$imagepolicy": "monitoring:metrics-server:tag"}
