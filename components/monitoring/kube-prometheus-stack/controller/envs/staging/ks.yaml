---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  targetNamespace: monitoring
  interval: 1m
  retryInterval: 30s
  timeout: 30s
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: kube-prometheus-stack
  path: components/monitoring/kube-prometheus-stack/controller/base
  patches:
    - patch: |-
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        metadata:
          name: version
        spec:
          chart:
            spec:
              version: "59.0.0" # {"$imagepolicy": "monitoring:kube-prometheus-stack:tag"}
      target:
        kind: HelmRelease
        name: kube-prometheus-stack
        namespace: monitoring
