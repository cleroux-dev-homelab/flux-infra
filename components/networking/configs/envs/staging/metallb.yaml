---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: metallb-config
spec:
  targetNamespace: metallb-system
  dependsOn:
    - name: metallb-controller
  interval: 1m0s
  retryInterval: 30s
  timeout: 30s
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-infra
  path: ./components/networking/configs/base/metallb
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: flux-runtime-info
