---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: metallb-config
  namespace: flux-system
spec:
  dependsOn:
    - name: metallb-controller
  targetNamespace: metallb-system
  interval: 1m0s
  retryInterval: 30s
  timeout: 30s
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-infra
  path: ./components/networking/metallb/config/base
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: flux-runtime-info
