---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: ingress-nginx
spec:
  interval: 12h
  url: https://kubernetes.github.io/ingress-nginx
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: ingress-nginx
spec:
  serviceAccountName: flux
  interval: 1h
  chart:
    spec:
      chart: ingress-nginx
      version: "4.11.1" # Can't automate since charts aren't OCI
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
      interval: 12h
  install:
    crds: Create
    timeout: 9m
  upgrade:
    crds: CreateReplace
    timeout: 9m
  valuesFrom:
    - kind: ConfigMap
      name: flux-ingress-nginx-config
      valuesKey: ingress-nginx-config.yaml
