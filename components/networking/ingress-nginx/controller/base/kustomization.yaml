---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ingress-nginx.yaml
  - rbac.yaml

configMapGenerator:
  - name: nginx-config
    files:
      - config.yaml
    options:
      labels:
        app.kubernetes.io/part-of: flux
        app.kubernetes.io/component: ingress

configurations:
  - kustomizeconfig.yaml
