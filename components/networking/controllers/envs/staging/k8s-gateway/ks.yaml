---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: k8s-gateway-controller
  namespace: flux-system
spec:
  targetNamespace: k8s-gateway
  dependsOn:
    - name: metallb-config
  interval: 1m0s
  retryInterval: 30s
  timeout: 30s
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-infra
  path: ./components/networking/controllers/base/k8s-gateway
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: flux-runtime-info
