apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - k8s-gateway.yaml

configMapGenerator:
  - name: flux-k8s-gateway-config
    files:
      - k8s-gateway-config.yaml
    options:
      labels:
        app.kubernetes.io/part-of: flux
        app.kubernetes.io/component: networking

configurations:
  - kustomizeconfig.yaml
